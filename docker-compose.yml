name: pelada-pede-mais-uma

services:
  app:
    image: ${APP_IMAGE:-pelada-pede-mais-uma:latest}
    build:
      context: .
      dockerfile: Dockerfile.multiarch
      target: runtime
      args:
        NODE_VERSION: ${NODE_VERSION:-22.19.0}
        WRANGLER_VERSION: ${WRANGLER_VERSION:-4.92.0}
        WORKERD_VERSION: ${WORKERD_VERSION:-1.20260515.1}
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "${HOST_PORT:-3000}:${PORT:-3000}"
    volumes:
      - app_data:/data
    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  app_data:
    name: ${DATA_VOLUME_NAME:-pelada-pede-mais-uma-data}
