name: pelada-pede-mais-uma-selfhost

services:
  app:
    image: ${SELFHOST_APP_IMAGE:-pelada-pede-mais-uma:selfhost}
    build:
      context: .
      dockerfile: Dockerfile.selfhost
      target: runtime
      args:
        NODE_VERSION: ${NODE_VERSION:-22.19.0}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${PORT:-3000}
      DATA_DIR: /data
      TZ: ${TZ:-America/Sao_Paulo}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "${HOST_PORT:-3000}:${PORT:-3000}"
    volumes:
      - selfhost_data:/data
    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  selfhost_data:
    name: ${SELFHOST_DATA_VOLUME_NAME:-pelada-pede-mais-uma-selfhost-data}
