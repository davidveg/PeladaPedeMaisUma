name: pelada-pede-mais-uma-dev

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NODE_VERSION: ${NODE_VERSION:-22.19.0}
    environment:
      NODE_ENV: development
      PORT: 3000
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
      - dev_worker_state:/app/.wrangler
    command:
      - sh
      - -c
      - |
        current_lock="$$(sha256sum package-lock.json | cut -d ' ' -f 1)"
        installed_lock="$$(cat node_modules/.package-lock.sha256 2>/dev/null || true)"
        if [ "$$current_lock" != "$$installed_lock" ]; then
          echo "Dependências alteradas; sincronizando node_modules..."
          npm ci --ignore-scripts --no-audit --no-fund
          printf '%s\n' "$$current_lock" > node_modules/.package-lock.sha256
        fi
        exec npm run dev -- --hostname 0.0.0.0 --port 3000
    init: true
    restart: unless-stopped

volumes:
  dev_node_modules:
  dev_worker_state:
