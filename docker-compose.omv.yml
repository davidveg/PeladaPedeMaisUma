name: pelada-pede-mais-uma

# Modelo para o plugin Compose do OMV. O arquivo Compose fica um nível acima
# do checkout do projeto, armazenado na pasta ./source.
services:
  app:
    image: pelada-pede-mais-uma:selfhost-arm64
    container_name: pelada-pede-mais-uma
    platform: linux/arm64
    build:
      context: ./source
      dockerfile: Dockerfile.selfhost.omv
      target: runtime
      privileged: true
      args:
        NODE_VERSION: 22.19.0
    user: "1000:100"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      DATA_DIR: /data
      TZ: America/Sao_Paulo
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_BASE_URL: ${APP_BASE_URL:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-peladapedemaisuma@gmail.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Pelada Pede Mais Uma <peladapedemaisuma@gmail.com>}
    volumes:
      - type: bind
        source: CHANGE_TO_COMPOSE_DATA_PATH/pelada-pede-mais-uma
        target: /data
    ports:
      - "3000:3000"
    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    security_opt:
      # O perfil seccomp do Docker/OMV neste Raspberry encerra o Node com SIGSYS (159).
      - seccomp:unconfined
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      logging: "promtail"
      logging_jobname: "pelada-pede-mais-uma"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
